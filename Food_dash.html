<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Details</title>
<link rel="stylesheet" href="Food_dash.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

</head>
<body>

<div class="app-container">

<div class="header-section" style="background: linear-gradient(270deg,#003C38,#006B64);">
<div class="status-bar">
    <span>9:23</span>
    <div class="status-icons">
        <svg  xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24">
        <path d="M0 0h24v24H0z" fill="none" />

        </svg>
        <svg xmlns="http://www.w3.org/2000/svg" width="1.6em" height="1.3em"  viewBox="0 0 24 24">
        <path d="M0 0h24v24H0z" fill="none" />
        <g fill="none">
        <path d="m12.593 23.258l-.011.002l-.071.035l-.02.004l-.014-.004l-.071-.035q-.016-.005-.024.005l-.004.01l-.017.428l.005.02l.01.013l.104.074l.015.004l.012-.004l.104-.074l.012-.016l.004-.017l-.017-.427q-.004-.016-.017-.018m.265-.113l-.013.002l-.185.093l-.01.01l-.003.011l.018.43l.005.012l.008.007l.201.093q.019.005.029-.008l.004-.014l-.034-.614q-.005-.018-.02-.022m-.715.002a.02.02 0 0 0-.027.006l-.006.014l-.034.614q.001.018.017.024l.015-.002l.201-.093l.01-.008l.004-.011l.017-.43l-.003-.012l-.01-.01z" />
        <path fill="currentColor" d="M4 6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-1a2 2 0 0 0 2-2v-2a2 2 0 0 0-2-2V8a2 2 0 0 0-2-2z" />
    </g>
    </svg>
    </div>
</div>

<div class="app-bar">
    <button class="back-btn" id="backBtn90">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <h1 class="page-title">Order Details</h1>
    <div class="spacer"></div>
</div>
</div>

<div class="main-content">

<div class="card stats-card">
    <div class="stat-col">
    <span class="stat-label">Token Number</span>
    <span class="stat-value highlight" id="tokenNumber">#252</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-col">
    <span class="stat-label">Total Paid</span>
    <span class="stat-value" id="totalPaid">₹ 30</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-col">
    <span class="stat-label">Status</span>
    <span class="stat-value">Preparing</span>
    </div>
</div>

<div class="card progress-card" id="edito">
    <h3 class="card-title">Order Progress</h3>
    
    <div class="stepper">
    <div class="step">
        <div class="step-icon active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <p class="step-text active-text">Confirmed</p>
    </div>
    
    <div class="step-line active-line"></div>
    
    <div class="step">
        <div class="step-icon active pulse-anim">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <p class="step-text active-text">Preparing</p>
    </div>
    
    <div class="step-line"></div>
    
    <div class="step">
        <div class="step-icon inactive"></div>
        <p class="step-text">Ready</p>
    </div>
    
    <div class="step-line"></div>
    
    <div class="step">
        <div class="step-icon inactive"></div>
        <p class="step-text">Delivered</p>
    </div>
    </div>
</div>

<button class="qr-action-btn" id="qrBtn1">
    <div class="qr-icon-box">
    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"></rect>
        <rect x="14" y="3" width="7" height="7"></rect>
        <rect x="14" y="14" width="7" height="7"></rect>
        <rect x="3" y="14" width="3" height="3"></rect>
        <rect x="7" y="18" width="3" height="3"></rect>
        <line x1="7" y1="14" x2="10" y2="14"></line>
    </svg>
    </div> 
    <div class="qr-text">
    <h3 class="qr-title">Show QR at Counter</h3>
    <p class="qr-subtitle">Tap to display the pickup code</p>
    </div>
</button>


<div class="card bill-card">
    <h3 class="card-title">Bill Details</h3>
    <div class="bill-row">
    <span>Order amount</span>
    <span id="billOrderAmount">₹ 30</span>
    </div>
    <div class="bill-row">
    <span>Convenience fee</span>
    <span id="billConvFee">₹ 0</span>
    </div>
    <hr class="bill-divider">
    <div class="bill-row total-row">
    <span>Total bill</span>
    <span id="billTotal">₹ 30</span>
    </div>
</div>

<div style="height: 120px;"></div>
</div>


<div class="bottom-nav">
    <div class="nav-item" id="homeSlide">
    <svg width="25" height="25" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </div>
    <div class="nav-item" style="height: 40px;" id="cardSlide">
    <svg xmlns="http://www.w3.org/2000/svg" width="1.8em" height="1.8em" viewBox="0 0 24 24">
	<path d="M0 0h24v24H0z" fill="none" />
	<path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9v8a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9M3 9V7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v2M3 9h18M7 13h5" />
    </svg>
    </div>
    <div class="nav-item active" id="orderSlide">
    <svg xmlns="http://www.w3.org/2000/svg" width="1.7em" height="1.7em" viewBox="0 0 16 16">
	<path d="M0 0h16v16H0z" fill="none" />
	<path fill="none" stroke="currentColor" stroke-linejoin="round" d="M5 11.5h4M5 9h6M5 6.5h6m-5.5-4h-2v12h9v-12h-2m-5-1h5l-.625 2h-3.75z" />
    </svg>
    </div>
    <div class="nav-item" id="profileSlide">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    </div>
</div>

<div class="qrmass">
<div class="qrcode">
    <img src="./source file/photo4.png" class="qr">
    <p style="color: white; font-weight: bold;"> Scan the QR Code</p>
</div>
</div>

<div class="greenLine1"></div>
<div class="home-indicator"></div>
</div>

<script src="payment.js"></script>
</body>
</html>
